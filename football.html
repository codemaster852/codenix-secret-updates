<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Soccer XL - Multiplayer Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --sky-blue: #1a2a6c;
            --grass-green: #2ecc71;
            --player-color: #e74c3c;
            --ai-color: #f1c40f;
            --ui-bg: rgba(0, 0, 0, 0.95);
        }

        body {
            margin: 0; padding: 0;
            background-color: #050505;
            color: white;
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            height: 100vh; overflow: hidden;
            touch-action: none;
        }

        #game-container {
            position: relative;
            box-shadow: 0 0 100px rgba(0, 0, 0, 1);
            border: 6px solid #333;
            background: #111;
            border-radius: 12px;
            overflow: hidden;
            max-width: 95vw;
        }

        canvas { display: block; background: linear-gradient(to bottom, #1a2a6c, #b21f1f, #fdbb2d); }

        #ui-overlay {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background: var(--ui-bg);
            z-index: 100; text-align: center;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            width: 80%;
            margin-top: 30px;
        }

        .menu-btn {
            background: #222;
            border: 2px solid #444;
            color: white;
            padding: 20px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .menu-btn:hover { background: #333; border-color: #ffcc00; transform: scale(1.05); }
        .menu-btn h3 { margin: 0 0 10px 0; color: #ffcc00; }
        .menu-btn p { margin: 0; font-size: 0.8rem; opacity: 0.7; }

        /* Mobile Controller Styles */
        #mobile-controller {
            display: none;
            width: 100vw; height: 100vh;
            background: #111;
            grid-template-areas: "dpad actions";
            grid-template-columns: 1fr 1fr;
            user-select: none;
        }

        .dpad { grid-area: dpad; display: grid; grid-template-columns: repeat(3, 1fr); align-items: center; justify-items: center; }
        .actions { grid-area: actions; display: grid; grid-template-columns: repeat(2, 1fr); align-items: center; justify-items: center; }

        .ctrl-btn {
            width: 80px; height: 80px;
            background: #333;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; border: 4px solid #555;
            touch-action: none;
        }
        .ctrl-btn:active { background: #555; transform: scale(0.9); }

        .score-board {
            position: absolute; top: 20px; width: 100%;
            display: flex; justify-content: center; z-index: 10;
        }
        .team-box { padding: 10px 30px; min-width: 120px; text-align: center; border: 2px solid white; }
        .timer-box { background: #000; padding: 10px 25px; font-size: 2.5rem; color: #0f0; border: 2px solid white; }

        .hidden { display: none !important; }
        #room-display { position: absolute; bottom: 10px; right: 10px; font-family: monospace; color: #ffcc00; }
    </style>
</head>
<body>

    <!-- Game View -->
    <div id="game-container">
        <div class="score-board">
            <div class="team-box" id="p1-ui" style="background: var(--player-color); border-radius: 10px 0 0 10px;">
                <div style="font-size: 0.8rem;">PLAYER 1</div>
                <div id="p-score">0</div>
            </div>
            <div class="timer-box" id="timer">60</div>
            <div class="team-box" id="p2-ui" style="background: var(--ai-color); color: black; border-radius: 0 10px 10px 0;">
                <div id="p2-label" style="font-size: 0.8rem;">PRO CPU</div>
                <div id="c-score">0</div>
            </div>
        </div>

        <canvas id="gameCanvas"></canvas>
        <div id="room-display" class="hidden">ROOM: <span id="room-code-txt">---</span></div>

        <div id="ui-overlay">
            <h1 style="font-size: 3rem; margin-bottom: 0;">PRO SOCCER XL</h1>
            <p id="menu-status" style="color: #ffcc00;">SELECT GAME MODE</p>
            
            <div class="menu-grid" id="main-menu">
                <div class="menu-btn" onclick="setMode('CPU')">
                    <h3>VS COMPUTER</h3>
                    <p>Classic single player</p>
                </div>
                <div class="menu-btn" onclick="setMode('SCREEN')">
                    <h3>SCREEN MODE</h3>
                    <p>Use 2 mobiles as controllers</p>
                </div>
                <div class="menu-btn" onclick="setMode('ONLINE')">
                    <h3>ONLINE MATCH</h3>
                    <p>Play against anyone</p>
                </div>
            </div>

            <div id="lobby-ui" class="hidden">
                <h2 id="lobby-code">----</h2>
                <p>Scan or enter this code on your mobile</p>
                <button class="menu-btn" onclick="location.reload()">CANCEL</button>
            </div>
        </div>
    </div>

    <!-- Mobile Controller View -->
    <div id="mobile-controller">
        <div class="dpad">
            <div></div><div class="ctrl-btn" id="btn-up">▲</div><div></div>
            <div class="ctrl-btn" id="btn-left">◀</div><div></div><div class="ctrl-btn" id="btn-right">▶</div>
        </div>
        <div class="actions">
            <div class="ctrl-btn" style="background: #e74c3c;" id="btn-kick">KICK</div>
            <div class="ctrl-btn" style="background: #f1c40f; color: black;" id="btn-power">SHR</div>
        </div>
    </div>

    <script>
        const SB_URL = "https://pqfydiligbnxpophipti.supabase.co";
        const SB_KEY = "sb_publishable_LE6Y0ujYmKgP8O69zu-gjA_q7GAN5wG";
        
        // Fix: Use the global supabase object correctly from the script import
        let supabaseClient;
        try {
            supabaseClient = window.supabase.createClient(SB_URL, SB_KEY);
        } catch (e) {
            console.error("Supabase initialization failed", e);
        }

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const W = 1200, H = 600, GROUND_Y = H - 80;
        canvas.width = W; canvas.height = H;

        let mode = 'CPU'; 
        let role = 'HOST'; // HOST or GUEST
        let roomCode = null;
        let channel = null;
        let gameState = 'MENU';
        let timeLeft = 60;
        let scores = { p: 0, c: 0 };
        
        // Input States
        let inputs = {
            p1: { left: false, right: false, up: false, kick: false, power: false },
            p2: { left: false, right: false, up: false, kick: false, power: false }
        };

        const ball = { x: W/2, y: H/2, r: 16, vx: 0, vy: 0, rot: 0, flame: false };
        const p1 = { x: 250, y: GROUND_Y, vx: 0, vy: 0, r: 38, color: '#e74c3c', jumpCount: 0, tackling: 0 };
        const p2 = { x: W-250, y: GROUND_Y, vx: 0, vy: 0, r: 38, color: '#f1c40f', jumpCount: 0, tackling: 0 };

        // Initialize Audio
        const AudioEngine = {
            ctx: null,
            play(t) {
                if(!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                const o = this.ctx.createOscillator(); const g = this.ctx.createGain();
                o.connect(g); g.connect(this.ctx.destination);
                o.start(); o.stop(this.ctx.currentTime + 0.1);
            }
        };

        // Check if user is on mobile via URL param
        const urlParams = new URLSearchParams(window.location.search);
        const joinCode = urlParams.get('join');
        const isController = !!joinCode;

        if (isController) {
            setupController(joinCode);
        }

        async function setupController(code) {
            document.getElementById('game-container').classList.add('hidden');
            document.getElementById('mobile-controller').style.display = 'grid';
            
            roomCode = code;
            channel = supabaseClient.channel(`room_${code}`);
            channel.subscribe(status => {
                if(status === 'SUBSCRIBED') {
                    console.log("Controller Connected");
                }
            });

            const bind = (id, key, player) => {
                const el = document.getElementById(id);
                const update = (val) => {
                    channel.send({
                        type: 'broadcast',
                        event: 'input',
                        payload: { player: urlParams.get('p') || 'p2', key, val }
                    });
                };
                el.addEventListener('touchstart', (e) => { e.preventDefault(); update(true); });
                el.addEventListener('touchend', (e) => { e.preventDefault(); update(false); });
            };

            bind('btn-up', 'up'); bind('btn-left', 'left'); bind('btn-right', 'right');
            bind('btn-kick', 'kick'); bind('btn-power', 'power');
        }

        async function setMode(m) {
            mode = m;
            if (m === 'CPU') {
                startGame();
            } else if (m === 'SCREEN' || m === 'ONLINE') {
                roomCode = Math.random().toString(36).substring(2, 7).toUpperCase();
                document.getElementById('main-menu').classList.add('hidden');
                document.getElementById('lobby-ui').classList.remove('hidden');
                document.getElementById('lobby-code').textContent = roomCode;
                document.getElementById('menu-status').textContent = m === 'SCREEN' ? "WAITING FOR 2 CONTROLLERS" : "WAITING FOR OPPONENT";
                
                initRealtime(roomCode);
            }
        }

        function initRealtime(code) {
            channel = supabaseClient.channel(`room_${code}`);
            
            channel
            .on('broadcast', { event: 'input' }, ({ payload }) => {
                inputs[payload.player][payload.key] = payload.val;
                if (gameState === 'MENU' && mode === 'ONLINE') startGame();
            })
            .subscribe(status => {
                if (status === 'SUBSCRIBED') {
                    document.getElementById('room-display').classList.remove('hidden');
                    document.getElementById('room-code-txt').textContent = code;
                }
            });

            if(role === 'GUEST') {
                channel.on('broadcast', { event: 'sync' }, ({ payload }) => {
                    Object.assign(ball, payload.ball);
                    Object.assign(p1, payload.p1);
                    Object.assign(p2, payload.p2);
                    scores = payload.scores;
                    timeLeft = payload.timeLeft;
                    updateUI();
                });
            }
        }

        function startGame() {
            gameState = 'PLAY';
            document.getElementById('ui-overlay').classList.add('hidden');
            if (mode !== 'CPU') {
                document.getElementById('p2-label').textContent = mode === 'SCREEN' ? "PLAYER 2" : "ONLINE OPP";
            }
            
            // Start clock
            const timerInt = setInterval(() => {
                if(gameState === 'PLAY' && role === 'HOST') {
                    timeLeft--;
                    if(timeLeft <= 0) {
                        gameState = 'OVER';
                        clearInterval(timerInt);
                    }
                    updateUI();
                } else if (gameState === 'OVER') {
                    clearInterval(timerInt);
                }
            }, 1000);

            requestAnimationFrame(tick);
        }

        function handlePhysics() {
            handleMovement(p1, inputs.p1);

            if (mode === 'CPU') {
                const dist = ball.x - p2.x;
                inputs.p2.left = dist < -40;
                inputs.p2.right = dist > 40;
                inputs.p2.up = ball.y < p2.y - 100 && Math.abs(dist) < 100;
                handleMovement(p2, inputs.p2);
            } else {
                handleMovement(p2, inputs.p2);
            }

            updateBall();
            checkCollision(p1);
            checkCollision(p2);

            if (mode === 'ONLINE' && role === 'HOST' && frame % 2 === 0) {
                channel.send({
                    type: 'broadcast',
                    event: 'sync',
                    payload: { ball, p1, p2, scores, timeLeft }
                });
            }
        }

        function handleMovement(p, inp) {
            if (inp.left) p.vx = -7;
            else if (inp.right) p.vx = 7;
            else p.vx *= 0.8;

            if (inp.up && p.y >= GROUND_Y) {
                p.vy = -15;
                AudioEngine.play();
            }

            p.vy += 0.6; p.x += p.vx; p.y += p.vy;
            if (p.y > GROUND_Y) { p.y = GROUND_Y; p.vy = 0; }
            p.x = Math.max(40, Math.min(W - 40, p.x));
        }

        function updateBall() {
            ball.vy += 0.5; ball.x += ball.vx; ball.y += ball.vy;
            if (ball.y > GROUND_Y - ball.r) { ball.y = GROUND_Y - ball.r; ball.vy *= -0.7; ball.vx *= 0.98; }
            if (ball.x < ball.r || ball.x > W - ball.r) { ball.vx *= -0.7; ball.x = ball.x < ball.r ? ball.r : W-ball.r; }
            
            if (ball.y > GROUND_Y - 160) {
                if (ball.x < 80) score('c');
                if (ball.x > W - 80) score('p');
            }
        }

        function score(who) {
            scores[who]++;
            ball.x = W/2; ball.y = H/3; ball.vx = 0; ball.vy = 0;
            updateUI();
        }

        function checkCollision(p) {
            const dx = ball.x - p.x, dy = ball.y - (p.y - 60);
            const dist = Math.sqrt(dx*dx + dy*dy);
            if (dist < ball.r + p.r) {
                const ang = Math.atan2(dy, dx);
                ball.vx = Math.cos(ang) * 15 + p.vx * 0.5;
                ball.vy = Math.sin(ang) * 15;
                AudioEngine.play();
            }
        }

        function updateUI() {
            document.getElementById('p-score').textContent = scores.p;
            document.getElementById('c-score').textContent = scores.c;
            document.getElementById('timer').textContent = timeLeft;
        }

        function draw() {
            ctx.clearRect(0, 0, W, H);
            ctx.fillStyle = '#27ae60'; ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);
            ctx.strokeStyle = '#fff'; ctx.lineWidth = 5;
            ctx.strokeRect(0, GROUND_Y - 160, 80, 160);
            ctx.strokeRect(W - 80, GROUND_Y - 160, 80, 160);
            drawPlayer(p1); drawPlayer(p2);
            ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2); ctx.fill();
        }

        function drawPlayer(p) {
            ctx.fillStyle = p.color; ctx.beginPath(); ctx.roundRect(p.x - 25, p.y - 50, 50, 45, 10); ctx.fill();
            ctx.fillStyle = '#ffdbac'; ctx.beginPath(); ctx.arc(p.x, p.y - 75, 40, 0, Math.PI*2); ctx.fill();
        }

        let frame = 0;
        function tick() {
            if (gameState === 'PLAY') {
                frame++;
                if(role === 'HOST') handlePhysics();
                draw();
            }
            requestAnimationFrame(tick);
        }

        window.onkeydown = (e) => {
            if (e.code === 'ArrowLeft') inputs.p1.left = true;
            if (e.code === 'ArrowRight') inputs.p1.right = true;
            if (e.code === 'ArrowUp') inputs.p1.up = true;
            if (gameState === 'MENU' && mode === 'CPU') startGame();
        };
        window.onkeyup = (e) => {
            if (e.code === 'ArrowLeft') inputs.p1.left = false;
            if (e.code === 'ArrowRight') inputs.p1.right = false;
            if (e.code === 'ArrowUp') inputs.p1.up = false;
        };

    </script>
</body>
</html>
