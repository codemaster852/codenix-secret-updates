<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Soccer XL - Multiplayer Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --p1: #e74c3c;
            --p2: #f1c40f;
            --bg: #0a0a0a;
        }

        body {
            margin: 0;
            background: #000;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
        }

        #game-container {
            position: relative;
            border: 4px solid #333;
            max-width: 100vw;
        }

        canvas {
            display: block;
            background: linear-gradient(to bottom, #1e3c72, #2a5298);
        }

        #ui-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            text-align: center;
        }

        .menu-grid {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }

        .menu-btn {
            background: #222;
            border: 2px solid #444;
            padding: 20px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
            width: 200px;
        }

        .menu-btn:hover {
            border-color: #ffcc00;
            transform: translateY(-2px);
        }

        .score-board {
            position: absolute;
            top: 20px;
            width: 100%;
            display: flex;
            justify-content: center;
            pointer-events: none;
            z-index: 10;
        }

        .team-box {
            padding: 10px 30px;
            min-width: 100px;
            text-align: center;
            font-weight: bold;
            border: 2px solid #fff;
        }

        .timer-box {
            background: #000;
            padding: 10px 20px;
            font-size: 2rem;
            border: 2px solid #fff;
            min-width: 60px;
            text-align: center;
            color: #0f0;
        }

        /* Mobile Controller Styles */
        #mobile-join-view {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            background: #111;
        }

        #mobile-code-input {
            padding: 15px;
            font-size: 2.5rem;
            width: 250px;
            text-align: center;
            background: #222;
            border: 2px solid #444;
            color: #ffcc00;
            border-radius: 15px;
            text-transform: uppercase;
        }

        .join-btns {
            display: flex;
            gap: 15px;
        }

        .join-btns button {
            padding: 20px 30px;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            color: white;
            cursor: pointer;
        }

        #mobile-controller {
            display: none;
            height: 100vh;
            width: 100vw;
            position: fixed;
            top: 0;
            left: 0;
            background: #050505;
        }

        .ctrl-area {
            position: absolute;
            bottom: 50px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 40px;
            box-sizing: border-box;
        }

        .dpad {
            display: grid;
            grid-template-columns: repeat(3, 90px);
            gap: 15px;
        }

        .ctrl-btn {
            width: 90px;
            height: 90px;
            background: #222;
            border: 4px solid #444;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
            user-select: none;
            touch-action: none;
        }

        .ctrl-btn.active {
            background: #ffcc00 !important;
            color: #000 !important;
            transform: scale(0.95);
        }

        .btn-kick {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: #e74c3c;
            border: 5px solid #fff;
            box-shadow: 0 10px 0 #922b21;
        }

        .hidden { display: none !important; }
        #error-msg { color: #ff4757; font-weight: bold; min-height: 1.5em; text-align: center; padding: 0 20px; }
    </style>
</head>
<body>

    <div id="game-container">
        <div class="score-board">
            <div class="team-box" style="background: var(--p1); border-radius: 10px 0 0 10px;">
                <div style="font-size: 0.7rem;">PLAYER 1</div>
                <div id="p-score">0</div>
            </div>
            <div id="timer" class="timer-box">60</div>
            <div class="team-box" style="background: var(--p2); color: #000; border-radius: 0 10px 10px 0;">
                <div id="p2-label" style="font-size: 0.7rem;">PRO CPU</div>
                <div id="c-score">0</div>
            </div>
        </div>

        <canvas id="gameCanvas"></canvas>

        <div id="ui-overlay">
            <h1 style="font-size: 3.5rem; margin: 0; letter-spacing: 3px;">PRO SOCCER XL</h1>
            <p id="menu-status" style="color: #ffcc00; font-weight: bold;">READY FOR KICKOFF?</p>
            
            <div id="main-menu" class="menu-grid">
                <div class="menu-btn" onclick="setMode('CPU')">
                    <h3>VS CPU</h3>
                    <p>Single Player</p>
                </div>
                <div class="menu-btn" onclick="setMode('online')">
                    <h3>MULTIPLAYER</h3>
                    <p>Mobile Controllers</p>
                </div>
            </div>

            <div id="lobby-ui" class="hidden">
                <p>JOINING CODE:</p>
                <h2 id="lobby-code" style="font-size: 6rem; color: #ffcc00; margin: 10px;">----</h2>
                <div id="waiting-status" style="color: #0f0;">SETTING UP ROOM...</div>
                <button class="menu-btn" style="margin-top: 20px;" onclick="location.reload()">BACK TO MENU</button>
            </div>
        </div>
    </div>

    <!-- Mobile UI -->
    <div id="mobile-join-view" class="hidden">
        <h1 style="color: #ffcc00; margin-bottom: 0;">SOCCER XL</h1>
        <p style="margin-top: 5px; opacity: 0.7;">CONTROLLER MODE</p>
        <input type="text" id="mobile-code-input" placeholder="CODE" maxlength="4">
        <div id="error-msg"></div>
        <div class="join-btns">
            <button onclick="joinAs('p1')" style="background: #e74c3c;">JOIN P1</button>
            <button onclick="joinAs('p2')" style="background: #f1c40f; color: #000;">JOIN P2</button>
        </div>
    </div>

    <div id="mobile-controller">
        <div style="padding: 20px; display: flex; justify-content: space-between; align-items: center;">
            <div style="color: #444; font-weight: bold;">ROOM: <span id="ctrl-room-id" style="color: #ffcc00;">-</span></div>
            <div id="player-indicator" style="padding: 8px 20px; border-radius: 10px; font-weight: bold;">-</div>
        </div>
        <div class="ctrl-area">
            <div class="dpad">
                <div id="btn-left" class="ctrl-btn" style="grid-column: 1;">LEFT</div>
                <div id="btn-up" class="ctrl-btn" style="grid-column: 2;">JUMP</div>
                <div id="btn-right" class="ctrl-btn" style="grid-column: 3;">RIGHT</div>
            </div>
            <div id="btn-kick" class="ctrl-btn btn-kick">KICK</div>
        </div>
    </div>

    <script>
        const SB_URL = "https://pqfydiligbnxpophipti.supabase.co";
        const SB_KEY = "sb_publishable_LE6Y0ujYmKgP8O69zu-gjA_q7GAN5wG";
        
        const sbClient = window.supabase.createClient(SB_URL, SB_KEY, {
            auth: { persistSession: false }
        });

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const W = 1200, H = 600, GROUND_Y = H - 80;
        canvas.width = W; canvas.height = H;

        let gameMode = 'CPU'; 
        let gameState = 'MENU';
        let roomCode = null;
        let timeLeft = 60;
        let scores = { p1: 0, p2: 0 };
        let isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

        let inputs = {
            p1: { left: false, right: false, up: false, kick: false },
            p2: { left: false, right: false, up: false, kick: false }
        };

        const ball = { x: W/2, y: H/2, r: 18, vx: 0, vy: 0, rot: 0 };
        const p1 = { x: 250, y: GROUND_Y, vx: 0, vy: 0, r: 40, color: '#e74c3c', tilt: 0 };
        const p2 = { x: W-250, y: GROUND_Y, vx: 0, vy: 0, r: 40, color: '#f1c40f', tilt: 0 };

        if (isMobile) {
            document.getElementById('game-container').classList.add('hidden');
            document.getElementById('mobile-join-view').classList.remove('hidden');
        }

        // Multiplayer logic
        async function setMode(m) {
            gameMode = m;
            if (m === 'CPU') {
                startGame();
            } else {
                document.getElementById('main-menu').classList.add('hidden');
                document.getElementById('lobby-ui').classList.remove('hidden');
                
                roomCode = Math.random().toString(36).substring(2, 6).toUpperCase();
                document.getElementById('lobby-code').textContent = roomCode;

                const { error } = await sbClient.from('rooms').insert([{
                    code: roomCode,
                    mode: 'online',
                    status: 'waiting',
                    state: { 
                        inputs, 
                        p1Active: false, 
                        p2Active: false,
                        scores: { p1: 0, p2: 0 } 
                    }
                }]);

                if (error) {
                    alert("Database connection error. Please refresh.");
                    return;
                }

                sbClient.channel(`room_${roomCode}`)
                    .on('postgres_changes', { 
                        event: 'UPDATE', 
                        schema: 'public', 
                        table: 'rooms', 
                        filter: `code=eq.${roomCode}` 
                    }, payload => {
                        const data = payload.new.state;
                        inputs = data.inputs;
                        document.getElementById('waiting-status').innerHTML = 
                            `<span style="color:${data.p1Active ? '#0f0':'#f00'}">P1: ${data.p1Active ? 'READY' : 'WAITING'}</span> | 
                             <span style="color:${data.p2Active ? '#0f0':'#f00'}">P2: ${data.p2Active ? 'READY' : 'WAITING'}</span>`;
                        
                        if (data.p1Active && data.p2Active && gameState === 'MENU') {
                            startGame();
                        }
                    })
                    .subscribe();
            }
        }

        async function joinAs(pKey) {
            const codeInput = document.getElementById('mobile-code-input').value.trim().toUpperCase();
            const err = document.getElementById('error-msg');
            if (!codeInput) { err.textContent = "Please enter a code"; return; }

            err.textContent = "Searching...";
            
            let roomData = null;
            for(let i=0; i<3; i++) {
                const { data } = await sbClient.from('rooms').select('*').eq('code', codeInput).single();
                if (data) { roomData = data; break; }
                await new Promise(r => setTimeout(r, 600));
            }

            if (!roomData) { 
                err.textContent = "Room not found. Check the code."; 
                return; 
            }

            let newState = roomData.state;
            if (newState[pKey + 'Active']) { err.textContent = "Slot already taken!"; return; }

            newState[pKey + 'Active'] = true;
            
            const { error: upError } = await sbClient.from('rooms')
                .update({ state: newState })
                .eq('code', codeInput);

            if (upError) { err.textContent = "Connection error."; return; }

            roomCode = codeInput;
            document.getElementById('mobile-join-view').classList.add('hidden');
            document.getElementById('mobile-controller').style.display = 'block';
            document.getElementById('ctrl-room-id').textContent = roomCode;
            
            const ind = document.getElementById('player-indicator');
            ind.textContent = pKey.toUpperCase();
            ind.style.background = pKey === 'p1' ? '#e74c3c' : '#f1c40f';
            ind.style.color = pKey === 'p1' ? '#fff' : '#000';

            setupController(pKey);
        }

        function setupController(pKey) {
            const updateRemoteInput = async () => {
                // Fetch latest state to avoid race condition overwrites
                const { data } = await sbClient.from('rooms').select('state').eq('code', roomCode).single();
                if (!data) return;
                
                let s = data.state;
                s.inputs[pKey] = inputs[pKey];
                await sbClient.from('rooms').update({ state: s }).eq('code', roomCode);
            };

            const handleInput = async (key, isPressed, element) => {
                if (inputs[pKey][key] === isPressed) return;
                inputs[pKey][key] = isPressed;
                if (isPressed) element.classList.add('active');
                else element.classList.remove('active');
                await updateRemoteInput();
            };

            const bindBtn = (id, key) => {
                const el = document.getElementById(id);
                // We use touchstart for immediate response
                el.addEventListener('touchstart', (e) => {
                    e.preventDefault(); // Stop scrolling/zooming
                    handleInput(key, true, el);
                }, { passive: false });

                el.addEventListener('touchend', (e) => {
                    e.preventDefault();
                    handleInput(key, false, el);
                }, { passive: false });

                // Mouse support for testing
                el.addEventListener('mousedown', (e) => handleInput(key, true, el));
                el.addEventListener('mouseup', (e) => handleInput(key, false, el));
            };

            bindBtn('btn-left', 'left');
            bindBtn('btn-right', 'right');
            bindBtn('btn-up', 'up');
            bindBtn('btn-kick', 'kick');

            // Safety check: if touch ends anywhere else, clear inputs
            window.addEventListener('touchend', () => {
                const keys = ['left', 'right', 'up', 'kick'];
                keys.forEach(k => {
                    if (inputs[pKey][k]) {
                        inputs[pKey][k] = false;
                        document.querySelector('.ctrl-btn.active')?.classList.remove('active');
                    }
                });
                updateRemoteInput();
            });
        }

        // Game Core
        function startGame() {
            gameState = 'PLAY';
            document.getElementById('ui-overlay').classList.add('hidden');
            document.getElementById('p2-label').textContent = gameMode === 'online' ? 'PLAYER 2' : 'PRO CPU';
            
            const timer = setInterval(() => {
                if (gameState === 'PLAY') {
                    timeLeft--;
                    document.getElementById('timer').textContent = timeLeft;
                    if (timeLeft <= 0) {
                        gameState = 'OVER';
                        clearInterval(timer);
                        endGame();
                    }
                }
            }, 1000);

            requestAnimationFrame(tick);
        }

        function endGame() {
            document.getElementById('ui-overlay').classList.remove('hidden');
            document.getElementById('main-menu').classList.remove('hidden');
            document.getElementById('lobby-ui').classList.add('hidden');
            const win = scores.p1 > scores.p2 ? "PLAYER 1 WINS!" : (scores.p2 > scores.p1 ? "PLAYER 2 WINS!" : "DRAW!");
            document.getElementById('menu-status').textContent = `GAME OVER - ${win}`;
        }

        function handlePhysics() {
            moveChar(p1, inputs.p1);
            
            if (gameMode === 'CPU') {
                const target = ball.x - p2.x;
                inputs.p2.left = target < -30;
                inputs.p2.right = target > 30;
                inputs.p2.up = ball.y < p2.y - 100 && Math.abs(target) < 120;
                inputs.p2.kick = Math.abs(target) < 60;
            }
            
            moveChar(p2, inputs.p2);
            updateBall();
            collide(p1); collide(p2);
        }

        function moveChar(p, inp) {
            if (inp.left) { p.vx = -8; p.tilt = -0.15; }
            else if (inp.right) { p.vx = 8; p.tilt = 0.15; }
            else { p.vx *= 0.85; p.tilt *= 0.8; }
            if (inp.up && p.y >= GROUND_Y) { p.vy = -16; }
            
            p.vy += 0.7; p.x += p.vx; p.y += p.vy;
            if (p.y > GROUND_Y) { p.y = GROUND_Y; p.vy = 0; }
            p.x = Math.max(50, Math.min(W - 50, p.x));
        }

        function updateBall() {
            ball.vy += 0.45; ball.x += ball.vx; ball.y += ball.vy; ball.rot += ball.vx * 0.05;
            
            if (ball.y > GROUND_Y - ball.r) { 
                ball.y = GROUND_Y - ball.r; ball.vy *= -0.6; ball.vx *= 0.98; 
            }
            if (ball.x < ball.r || ball.x > W - ball.r) { 
                ball.vx *= -0.7; ball.x = ball.x < ball.r ? ball.r : W - ball.r; 
            }
            
            if (ball.y > GROUND_Y - 160) {
                if (ball.x < 80) { scores.p2++; resetBall(); }
                if (ball.x > W - 80) { scores.p1++; resetBall(); }
                document.getElementById('p-score').textContent = scores.p1;
                document.getElementById('c-score').textContent = scores.p2;
            }
        }

        function resetBall() { ball.x = W/2; ball.y = H/3; ball.vx = 0; ball.vy = 0; }

        function collide(p) {
            const dx = ball.x - p.x, dy = ball.y - (p.y - 60);
            const dist = Math.sqrt(dx*dx + dy*dy);
            if (dist < ball.r + p.r) {
                const ang = Math.atan2(dy, dx);
                const force = 14 + (p.vx !== 0 ? 3 : 0);
                ball.vx = Math.cos(ang) * force + p.vx * 0.4;
                ball.vy = Math.sin(ang) * force;
                ball.x += Math.cos(ang) * 5; ball.y += Math.sin(ang) * 5;
            }
        }

        function tick() {
            if (gameState === 'PLAY') {
                handlePhysics();
                ctx.clearRect(0, 0, W, H);
                ctx.fillStyle = '#2ecc71'; ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);
                ctx.strokeStyle = '#fff'; ctx.lineWidth = 4;
                ctx.strokeRect(0, GROUND_Y - 160, 80, 160); ctx.strokeRect(W - 80, GROUND_Y - 160, 80, 160);
                drawPlayer(p1); drawPlayer(p2);
                ctx.save(); ctx.translate(ball.x, ball.y); ctx.rotate(ball.rot);
                ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(0, 0, ball.r, 0, Math.PI*2); ctx.fill();
                ctx.strokeStyle = '#000'; ctx.lineWidth = 2; ctx.stroke();
                ctx.restore();
            }
            requestAnimationFrame(tick);
        }

        function drawPlayer(p) {
            ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.tilt);
            ctx.fillStyle = p.color; ctx.beginPath(); ctx.roundRect(-25, -50, 50, 45, 10); ctx.fill();
            ctx.fillStyle = '#ffdbac'; ctx.beginPath(); ctx.arc(0, -75, 40, 0, Math.PI*2); ctx.fill();
            ctx.restore();
        }

        window.onkeydown = (e) => {
            if (e.code === 'ArrowLeft') inputs.p1.left = true;
            if (e.code === 'ArrowRight') inputs.p1.right = true;
            if (e.code === 'ArrowUp') inputs.p1.up = true;
        };
        window.onkeyup = (e) => {
            if (e.code === 'ArrowLeft') inputs.p1.left = false;
            if (e.code === 'ArrowRight') inputs.p1.right = false;
            if (e.code === 'ArrowUp') inputs.p1.up = false;
        };
    </script>
</body>
</html>
